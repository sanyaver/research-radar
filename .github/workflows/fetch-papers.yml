name: Fetch Research Papers

on:
  schedule:
    - cron: '0 7 * * *'   # 7am UTC daily
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and score papers
        run: python scripts/fetch_papers.py

      - name: Commit and push
        run: |
          git config user.name "Research Radar Bot"
          git config user.email "actions@github.com"
          git add data/papers.json
          git diff --staged --quiet || (
            git commit -m "chore: update papers $(date -u +'%Y-%m-%d')" &&
            git push
          )
